<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEV.SOFT AI</title>
    <style>
        body { background: #0a0e14; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #0096ff; background: rgba(20,25,35,0.8); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
        .user { align-self: flex-end; background: #0052cc; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1c232d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .input-form { padding: 20px; background: #141923; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; outline: none; }
        input:focus { border-color: #0096ff; }
        button { background: #0096ff; color: white; border: none; padding: 0 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0;">KEV.SOFT AI</h3>
    <span style="font-size: 10px; opacity: 0.6;">Powered by KevCodex</span>[span_15](start_span)[span_15](end_span)
</header>

<div id="chat-box"></div>

<form class="input-form" id="chat-form">
    <input type="text" id="user-input" placeholder="Tanya Kevin..." required autocomplete="off">
    <button type="submit" id="send-btn">SEND</button>
</form>

<script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let history = [];

    function addMsg(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.onsubmit = async (e) => {
        e.preventDefault();
        const msg = userInput.value.trim();
        if(!msg) return;

        addMsg(msg, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: msg, history: history })
            });

            const data = await res.json();
            if(data.reply) {
                addMsg(data.reply, 'ai');
                history.push({ role: 'user', content: msg });
                history.push({ role: 'assistant', content: data.reply });
            } else {
                throw new Error();
            }
        } catch (err) {
            addMsg("Gagal terhubung ke API. Coba cek log Vercel kamu, Vin.", 'ai');[span_16](start_span)[span_16](end_span)
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
