<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEV.SOFT AI</title>
    <style>
        body { background: #0a0e14; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid #0096ff; background: #141923; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { align-self: flex-end; background: #0052cc; }
        .ai { align-self: flex-start; background: #1c232d; border: 1px solid #333; }
        .input-area { padding: 15px; background: #141923; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; outline: none; }
        button { background: #0096ff; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0;">KEV.SOFT AI</h3>
    <small>gemini-1.5-flash | temp: 2</small>
</header>

<div id="chat-window"></div>

<form class="input-area" id="chat-form">
    <input type="text" id="user-input" placeholder="Tanya Kevin..." required autocomplete="off">
    <button type="submit" id="send-btn">SEND</button>
</form>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let history = [];

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    chatForm.onsubmit = async (e) => {
        e.preventDefault();
        const msg = userInput.value.trim();
        if(!msg) return;

        addMessage(msg, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: msg, history: history })
            });

            const data = await res.json();
            if(data.reply) {
                addMessage(data.reply, 'ai');
                history.push({ role: 'user', content: msg });
                history.push({ role: 'assistant', content: data.reply });
            } else {
                throw new Error();
            }
        } catch (err) {
            addMessage("Gagal terhubung ke API Vercel.", 'ai');
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
