<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEV.SOFT AI - Chat</title>
    <style>
        :root { --accent: #0096ff; --bg: #0a0e14; --panel: #141923; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; text-align: center; background: var(--panel); border-bottom: 1px solid var(--accent); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: linear-gradient(135deg, #0052cc, var(--accent)); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #1c232d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0; letter-spacing: 1px;">KEV.SOFT AI</h3>
    <div style="font-size: 0.7rem; opacity: 0.6; margin-top: 3px;">Developer: Kevin | v1.0</div>[span_13](start_span)[span_13](end_span)
</header>

<div id="chat-window">
    <div class="msg ai">Halo! Saya Kevin, developer kecil-kecilan. Ada yang bisa saya bantu?</div>[span_14](start_span)[span_14](end_span)
</div>

<form class="input-area" id="chat-form">
    <input type="text" id="user-input" placeholder="Tanya sesuatu..." required autocomplete="off">
    <button type="submit" id="send-btn">KIRIM</button>
</form>

<script>
    const chatWindow = document.getElementById('chat-window');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let history = [];

    function append(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    chatForm.onsubmit = async (e) => {
        e.preventDefault();
        const msg = userInput.value.trim();
        if(!msg) return;

        append(msg, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: msg, history: history })
            });

            const data = await res.json();
            if(data.reply) {
                append(data.reply, 'ai');
                history.push({ role: 'user', content: msg });
                history.push({ role: 'assistant', content: data.reply });
            } else {
                throw new Error(data.error);
            }
        } catch (err) {
            append("Gagal terhubung ke API. Pastikan deploy di Vercel sudah selesai.", 'ai');[span_15](start_span)[span_15](end_span)
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
