<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEV.SOFT AI - Vercel</title>
    <style>
        :root { --main-blue: #0096ff; --bg-dark: #0a0e14; }
        body { background: var(--bg-dark); color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid #333; background: rgba(20,25,35,0.9); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 10px; max-width: 80%; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--main-blue); color: white; }
        .ai { align-self: flex-start; background: #1c232d; border: 1px solid #333; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #141923; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: white; outline: none; }
        button { padding: 10px 20px; background: var(--main-blue); border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0; color:var(--main-blue);">KEV.SOFT AI</h2>
    <small>gemini-1.5-flash | temp: 2</small>
</header>

<div id="chat-box"></div>

<form class="input-area" id="chat-form">
    <input type="text" id="user-input" placeholder="Tanya Kevin..." required>
    <button type="submit" id="send-btn">KIRIM</button>
</form>

<script>
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let history = [];

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.onsubmit = async (e) => {
        e.preventDefault();
        const text = userInput.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        userInput.value = '';
        sendBtn.disabled = true;

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: text, history: history })
            });

            const data = await res.json();
            
            if (data.reply) {
                addMessage(data.reply, 'ai');
                history.push({ role: 'user', content: text });
                history.push({ role: 'assistant', content: data.reply });
            } else {
                throw new Error();
            }
        } catch (err) {
            addMessage("Waduh, ada error di server nih. Coba lagi, Vin.", 'ai');
        } finally {
            sendBtn.disabled = false;
        }
    };
</script>
</body>
</html>
